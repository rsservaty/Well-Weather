<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DWD Wetternews – Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1d2e 0%, #16213e 100%);
      border-bottom: 1px solid #2a2d3e;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
    }

    header .dwd-badge {
      font-size: 0.7rem;
      background: #1e4d8c;
      color: #7eb8f7;
      border: 1px solid #2d6bbf;
      border-radius: 4px;
      padding: 2px 7px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* ---- Bulletin Card (short) ---- */
    .card {
      background: #1a1d2e;
      border: 1px solid #2a2d3e;
      border-radius: 14px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1.1rem 0.7rem;
      border-bottom: 1px solid #2a2d3e;
    }

    .card-header .icon {
      font-size: 1.1rem;
    }

    .card-header h2 {
      font-size: 0.9rem;
      font-weight: 700;
      color: #c8d0e8;
      flex: 1;
    }

    .card-header .ts {
      font-size: 0.72rem;
      color: #6b7280;
    }

    .card-body {
      padding: 1rem 1.1rem;
    }

    /* Bulletin (short overview) */
    .bulletin-title {
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.4;
      margin-bottom: 0.8rem;
    }

    .bulletin-text {
      font-size: 0.88rem;
      color: #c0c8dc;
      line-height: 1.65;
    }

    .bulletin-text p { margin-bottom: 0.5rem; }
    .bulletin-text p:last-child { margin-bottom: 0; }

    /* Source tag */
    .source-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      color: #6b7280;
      margin-top: 0.75rem;
    }

    /* ---- Full report ---- */
    .report-section {
      margin-top: 0.25rem;
    }

    .report-toggle {
      width: 100%;
      background: #141622;
      border: 1px solid #2a2d3e;
      border-radius: 10px;
      color: #7eb8f7;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.7rem 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.15s;
    }

    .report-toggle:hover { background: #1a1d2e; }

    .report-toggle .chevron {
      transition: transform 0.25s;
      font-size: 0.85rem;
    }

    .report-toggle.open .chevron { transform: rotate(180deg); }

    .report-body {
      display: none;
      background: #141622;
      border: 1px solid #2a2d3e;
      border-top: none;
      border-radius: 0 0 10px 10px;
      padding: 1rem 1.1rem 1.1rem;
    }

    .report-body.open { display: block; }

    .report-meta {
      font-size: 0.72rem;
      color: #6b7280;
      margin-bottom: 0.8rem;
      font-family: monospace;
    }

    .report-section-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #7eb8f7;
      margin: 1rem 0 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .report-section-label:first-of-type { margin-top: 0; }

    .report-text {
      font-size: 0.83rem;
      color: #b0bcd4;
      line-height: 1.7;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .highlight-box {
      background: #1a2640;
      border: 1px solid #2d4a7a;
      border-radius: 8px;
      padding: 0.75rem 0.9rem;
      font-size: 0.85rem;
      color: #a8c8f0;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }

    /* Loading */
    .loading {
      color: #6b7280;
      font-size: 0.85rem;
      padding: 1rem 0;
      text-align: center;
    }

    .error {
      color: #f87171;
      font-size: 0.85rem;
      padding: 0.5rem 0;
    }

    /* Label pill */
    .label-pill {
      display: inline-block;
      font-size: 0.68rem;
      background: #1e3a5c;
      color: #7eb8f7;
      border-radius: 20px;
      padding: 2px 9px;
      font-weight: 600;
      margin-bottom: 0.6rem;
    }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.4rem">🌤️</span>
  <h1>Wetternews Deutschland</h1>
  <span class="dwd-badge">DWD</span>
</header>

<div class="container">

  <!-- Short Bulletin -->
  <div class="card" id="bulletin-card">
    <div class="card-header">
      <span class="icon">📋</span>
      <h2>Aktuelle Wetterlage</h2>
      <span class="ts" id="bulletin-ts"></span>
    </div>
    <div class="card-body">
      <div class="loading" id="bulletin-loading">Lade DWD-Bericht…</div>
      <div id="bulletin-content" style="display:none">
        <span class="label-pill">DWD Kurzübersicht</span>
        <div class="bulletin-title" id="bulletin-title"></div>
        <div class="bulletin-text" id="bulletin-text"></div>
        <div class="source-tag">🔗 Quelle: opendata.dwd.de · Deutscher Wetterdienst</div>
      </div>
      <div class="error" id="bulletin-error" style="display:none"></div>
    </div>
  </div>

  <!-- Full Synoptic Report -->
  <div class="report-section">
    <button class="report-toggle" id="report-toggle" onclick="toggleReport()">
      <span>📄 Vollständiger Synoptischer Bericht (Kurzfrist)</span>
      <span class="chevron">▼</span>
    </button>
    <div class="report-body" id="report-body">
      <div class="loading" id="report-loading">Lade vollständigen Bericht…</div>
      <div id="report-content" style="display:none"></div>
      <div class="error" id="report-error" style="display:none"></div>
    </div>
  </div>

</div>

<script>
'use strict';

// Fetch with ISO-8859-1 decoding (DWD uses Latin-1)
async function fetchDWD(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const buf = await res.arrayBuffer();
  return new TextDecoder('iso-8859-1').decode(buf);
}

// ---- Short Bulletin ----
async function loadBulletin() {
  try {
    const html = await fetchDWD(
      'https://opendata.dwd.de/weather/text_forecasts/html/VHDL50_DWEG_LATEST_html'
    );

    // Extract bold title (between ** ... **)
    const titleMatch = html.match(/\*\*(.+?)\*\*/s);
    const title = titleMatch ? titleMatch[1].trim() : '';

    // Extract plain text paragraphs from code block
    const codeMatch = html.match(/```([\s\S]+?)```/);
    const body = codeMatch ? codeMatch[1].trim() : '';

    // Split into paragraphs
    const paras = body.split(/\n\n+/).map(p => p.trim()).filter(Boolean);

    document.getElementById('bulletin-title').textContent = title;

    const textEl = document.getElementById('bulletin-text');
    textEl.innerHTML = paras.map(p =>
      `<p>${p.replace(/\n/g, ' ')}</p>`
    ).join('');

    // Timestamp from header
    const now = new Date();
    document.getElementById('bulletin-ts').textContent =
      `${now.toLocaleDateString('de-DE')} · ${now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'})} Uhr`;

    document.getElementById('bulletin-loading').style.display = 'none';
    document.getElementById('bulletin-content').style.display = 'block';

  } catch (e) {
    document.getElementById('bulletin-loading').style.display = 'none';
    const err = document.getElementById('bulletin-error');
    err.style.display = 'block';
    err.textContent = 'Fehler beim Laden: ' + e.message;
  }
}

// ---- Full Report ----
async function loadReport() {
  try {
    const text = await fetchDWD(
      'https://opendata.dwd.de/weather/text_forecasts/txt/SXDL31_DWAV_LATEST'
    );

    const lines = text.split('\n');

    // Parse sections
    let meta = '';
    let gwl = '';
    let synoptic = '';
    let modelComp = '';
    let author = '';

    let currentSection = 'header';
    let buffer = [];

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];

      if (line.includes('GWL und markante Wettererscheinungen')) {
        if (buffer.length) { meta = buffer.join('\n').trim(); buffer = []; }
        currentSection = 'gwl';
        continue;
      }
      if (line.includes('Synoptische Entwicklung')) {
        if (buffer.length) { gwl = buffer.join('\n').trim(); buffer = []; }
        currentSection = 'synoptic';
        buffer.push(line);
        continue;
      }
      if (line.includes('Modellvergleich')) {
        if (buffer.length) { synoptic = buffer.join('\n').trim(); buffer = []; }
        currentSection = 'model';
        continue;
      }
      if (line.includes('Vorhersage- und Beratungszentrale')) {
        if (buffer.length) { modelComp = buffer.join('\n').trim(); buffer = []; }
        currentSection = 'author';
        buffer.push(line);
        continue;
      }

      buffer.push(line);
    }

    if (buffer.length) {
      if (currentSection === 'author') author = buffer.join('\n').trim();
      else if (currentSection === 'model') modelComp = buffer.join('\n').trim();
    }

    // Build content
    const contentEl = document.getElementById('report-content');
    let html = '';

    if (meta) {
      html += `<div class="report-meta">${escHtml(meta)}</div>`;
    }

    if (gwl) {
      html += `<div class="report-section-label">🌡️ GWL & Markante Wettererscheinungen</div>`;
      html += `<div class="highlight-box">${escHtml(gwl)}</div>`;
    }

    if (synoptic) {
      html += `<div class="report-section-label">🗺️ Synoptische Entwicklung</div>`;
      html += `<div class="report-text">${escHtml(synoptic)}</div>`;
    }

    if (modelComp) {
      html += `<div class="report-section-label">📊 Modellvergleich</div>`;
      html += `<div class="report-text">${escHtml(modelComp)}</div>`;
    }

    if (author) {
      html += `<div style="margin-top:1rem;font-size:0.75rem;color:#6b7280;border-top:1px solid #2a2d3e;padding-top:0.75rem">${escHtml(author)}</div>`;
    }

    contentEl.innerHTML = html;

    document.getElementById('report-loading').style.display = 'none';
    contentEl.style.display = 'block';

  } catch (e) {
    document.getElementById('report-loading').style.display = 'none';
    const err = document.getElementById('report-error');
    err.style.display = 'block';
    err.textContent = 'Fehler beim Laden: ' + e.message;
  }
}

function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

let reportLoaded = false;

function toggleReport() {
  const btn = document.getElementById('report-toggle');
  const body = document.getElementById('report-body');
  btn.classList.toggle('open');
  body.classList.toggle('open');

  if (!reportLoaded) {
    reportLoaded = true;
    loadReport();
  }
}

// Init
loadBulletin();
</script>

</body>
</html>
